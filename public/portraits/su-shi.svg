<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E1A24"/>
      <stop offset="100%" stop-color="#0F1419"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5BA3C4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5BA3C4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#5BA3C4" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)" rx="8"/>
  <!-- River waves -->
  <path d="M0 160 Q50 150 100 160 Q150 170 200 160 Q250 150 300 160 Q350 170 400 160" stroke="#5BA3C4" stroke-width="1" fill="none" opacity="0.1"/>
  <path d="M0 180 Q60 170 120 180 Q180 190 240 180 Q300 170 360 180 L400 178" stroke="#5BA3C4" stroke-width="1" fill="none" opacity="0.06"/>
  <!-- Boat silhouette -->
  <path d="M180 175 Q200 170 220 175 Q210 185 200 185Z" fill="#5BA3C4" opacity="0.12" filter="url(#glow)"/>
  <!-- Figure standing by river, robe flowing in wind -->
  <g transform="translate(160, 160)">
    <!-- Tall upright body -->
    <path d="M40 180 Q35 130 40 80 Q45 50 45 35 Q55 15 65 35 Q65 60 60 80 Q55 130 50 180Z" stroke="#5BA3C4" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- Wide scholar robe -->
    <path d="M50 180 Q65 220 40 260 L80 260 Q55 220 50 180Z" stroke="#5BA3C4" stroke-width="1.5" fill="#5BA3C4" opacity="0.06"/>
    <!-- Sleeves billowing -->
    <path d="M35 90 Q10 100 5 130" stroke="#5BA3C4" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M65 90 Q90 100 95 130" stroke="#5BA3C4" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- Head facing left, thoughtful -->
    <ellipse cx="50" cy="28" rx="18" ry="22" fill="#5BA3C4" opacity="0.2"/>
    <!-- Hat (song dynasty official/futou) -->
    <path d="M28 18 Q50 5 72 18" stroke="#5BA3C4" stroke-width="1.5" fill="none" opacity="0.3"/>
    <path d="M30 18 L25 10" stroke="#5BA3C4" stroke-width="1" opacity="0.2"/>
    <path d="M70 18 L75 10" stroke="#5BA3C4" stroke-width="1" opacity="0.2"/>
  </g>
  <!-- Seal -->
  <rect x="290" y="400" width="60" height="60" rx="4" fill="none" stroke="#5BA3C4" stroke-width="1" opacity="0.5"/>
  <text x="320" y="440" text-anchor="middle" fill="#5BA3C4" font-size="24" font-family="serif" opacity="0.7">东坡</text>
</svg>