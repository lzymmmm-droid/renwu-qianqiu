<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1410"/>
      <stop offset="100%" stop-color="#0F1419"/>
    </linearGradient>
    <linearGradient id="crown-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C060"/>
      <stop offset="100%" stop-color="#D4A030"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)" rx="8"/>
  <!-- Sun/Empress radiance behind -->
  <circle cx="200" cy="200" r="100" fill="#D4A030" opacity="0.04" filter="url(#glow)"/>
  <circle cx="200" cy="200" r="60" fill="#D4A030" opacity="0.06" filter="url(#glow)"/>
  <!-- Phoenix tail feathers (symbol of empress) -->
  <g fill="#D4A030" opacity="0.06">
    <path d="M250 120 Q300 100 320 140 Q280 130 250 120Z"/>
    <path d="M260 140 Q320 130 330 160 Q280 150 260 140Z"/>
    <path d="M150 120 Q100 100 80 140 Q120 130 150 120Z"/>
  </g>
  <!-- Palace gate hint -->
  <path d="M100 350 L150 250 L250 250 L300 350" stroke="#D4A030" stroke-width="1" fill="none" opacity="0.06"/>
  <!-- Figure - regal empress -->
  <g transform="translate(155, 160)">
    <!-- Imperial robe -->
    <path d="M45 180 Q30 130 35 70 Q38 40 40 25 Q50 10 60 25 Q62 55 60 70 Q58 130 55 180Z" stroke="#D4A030" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- Wide imperial robe train -->
    <path d="M45 180 L55 180 Q70 230 50 270 L30 270 Q20 230 45 180Z" stroke="#D4A030" stroke-width="1.5" fill="#D4A030" opacity="0.06"/>
    <path d="M45 180 L55 180 Q80 240 60 280 L80 280 Q80 240 55 180Z" stroke="#D4A030" stroke-width="1" fill="#D4A030" opacity="0.03"/>
    <!-- Sleeves (宽大龙袍袖) -->
    <path d="M30 80 Q10 90 8 110" stroke="#D4A030" stroke-width="1.5" fill="none" opacity="0.35"/>
    <path d="M65 80 Q85 90 90 110" stroke="#D4A030" stroke-width="1.5" fill="none" opacity="0.35"/>
    <!-- Head - tall crown/empress diadem -->
    <ellipse cx="48" cy="22" rx="16" ry="20" fill="#D4A030" opacity="0.18"/>
    <!-- Imperial crown (凤冠) -->
    <path d="M28 12 Q48 0 68 12" stroke="#E8C060" stroke-width="2" fill="none" opacity="0.5" filter="url(#glow)"/>
    <path d="M30 12 L30 5" stroke="#E8C060" stroke-width="1.5" opacity="0.4"/>
    <path d="M48 6 L48 0" stroke="#E8C060" stroke-width="2" opacity="0.5"/>
    <path d="M66 12 L66 5" stroke="#E8C060" stroke-width="1.5" opacity="0.4"/>
    <!-- Dangling beads -->
    <circle cx="30" cy="8" r="1.5" fill="#E8C060" opacity="0.4"/>
    <circle cx="66" cy="8" r="1.5" fill="#E8C060" opacity="0.4"/>
  </g>
  <!-- Character: 曌 (zhao - invented character) -->
  <text x="320" y="380" fill="#D4A030" font-size="24" font-family="serif" opacity="0.08">曌</text>
  <!-- Seal -->
  <rect x="290" y="400" width="60" height="60" rx="4" fill="none" stroke="#D4A030" stroke-width="1" opacity="0.5"/>
  <text x="320" y="440" text-anchor="middle" fill="#D4A030" font-size="22" font-family="serif" opacity="0.7">武曌</text>
</svg>