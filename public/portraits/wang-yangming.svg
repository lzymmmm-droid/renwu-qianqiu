<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1412"/>
      <stop offset="100%" stop-color="#0F1419"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)" rx="8"/>
  <!-- Light/illumination from within -->
  <circle cx="180" cy="250" r="120" fill="#A85A4D" opacity="0.04" filter="url(#glow)"/>
  <circle cx="180" cy="250" r="80" fill="#A85A4D" opacity="0.06" filter="url(#glow)"/>
  <circle cx="180" cy="250" r="40" fill="#A85A4D" opacity="0.1" filter="url(#glow)"/>
  <!-- Bamboo (symbol of integrity) -->
  <g stroke="#A85A4D" stroke-width="1" opacity="0.08">
    <line x1="320" y1="50" x2="320" y2="400"/>
    <line x1="320" y1="100" x2="300" y2="95"/>
    <line x1="320" y1="150" x2="340" y2="145"/>
    <line x1="320" y1="200" x2="300" y2="195"/>
    <line x1="320" y1="250" x2="340" y2="245"/>
    <line x1="320" y1="300" x2="300" y2="295"/>
  </g>
  <!-- Figure - seated in meditation/posture -->
  <g transform="translate(145, 180)">
    <!-- Cross-legged sitting posture -->
    <path d="M50 150 Q40 110 45 70 Q48 40 50 28 Q58 15 66 28 Q65 55 62 70 Q58 110 55 150Z" stroke="#A85A4D" stroke-width="2" fill="none" opacity="0.55"/>
    <!-- Robe spreading for lotus pose -->
    <path d="M35 140 L85 140 Q70 170 60 180 L50 180 Q40 170 35 140Z" stroke="#A85A4D" stroke-width="1.2" fill="#A85A4D" opacity="0.05"/>
    <!-- Hands folded in lap (mudra) -->
    <ellipse cx="50" cy="130" rx="8" ry="5" fill="none" stroke="#A85A4D" stroke-width="1" opacity="0.35"/>
    <!-- Head, face forward -->
    <ellipse cx="52" cy="24" rx="16" ry="20" fill="#A85A4D" opacity="0.18"/>
    <!-- Scholar hat/headpiece -->
    <path d="M32 16 Q52 5 72 16" stroke="#A85A4D" stroke-width="1.5" fill="none" opacity="0.3"/>
    <!-- Aura lines emanating -->
    <path d="M20 100 Q10 80 15 60" stroke="#A85A4D" stroke-width="0.8" fill="none" opacity="0.15"/>
    <path d="M85 100 Q95 80 90 60" stroke="#A85A4D" stroke-width="0.8" fill="none" opacity="0.15"/>
  </g>
  <!-- Text: 心 -->
  <text x="100" y="400" fill="#A85A4D" font-size="60" font-family="serif" opacity="0.04" font-weight="bold">心</text>
  <!-- Seal -->
  <rect x="290" y="400" width="60" height="60" rx="4" fill="none" stroke="#A85A4D" stroke-width="1" opacity="0.5"/>
  <text x="320" y="440" text-anchor="middle" fill="#A85A4D" font-size="22" font-family="serif" opacity="0.7">阳明</text>
</svg>