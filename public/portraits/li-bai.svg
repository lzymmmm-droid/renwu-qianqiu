<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1410"/>
      <stop offset="100%" stop-color="#0F1419"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E5C878"/>
      <stop offset="100%" stop-color="#C9A04E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)" rx="8"/>
  <!-- Moon -->
  <circle cx="260" cy="80" r="40" fill="url(#moon)" opacity="0.3" filter="url(#glow)"/>
  <!-- Ink mountain silhouette -->
  <path d="M0 420 Q80 340 120 370 Q160 300 200 330 Q240 260 280 290 Q320 240 360 270 L400 250 L400 500 L0 500Z" fill="#C9A04E" opacity="0.08"/>
  <!-- Figure in robe, looking up at moon -->
  <g transform="translate(160, 160)">
    <!-- Robe body -->
    <path d="M40 180 Q30 140 35 100 Q40 60 40 40 Q50 20 60 40 Q60 80 55 100 Q60 140 50 180Z" stroke="#C9A04E" stroke-width="2" fill="none" opacity="0.7"/>
    <!-- Robe flow -->
    <path d="M50 180 Q60 220 40 260 Q30 280 20 300 L80 300 Q70 280 50 260 Q40 220 50 180Z" stroke="#C9A04E" stroke-width="1.5" fill="#C9A04E" opacity="0.08"/>
    <!-- Head/hair -->
    <ellipse cx="40" cy="30" rx="18" ry="22" fill="#C9A04E" opacity="0.3"/>
    <!-- Sword hint at waist -->
    <line x1="55" y1="120" x2="70" y2="160" stroke="#E5C878" stroke-width="1" opacity="0.4"/>
    <!-- Arm reaching up -->
    <path d="M35 80 Q20 60 15 40" stroke="#C9A04E" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- Wine cup in hand -->
    <rect x="10" y="38" width="10" height="12" rx="2" fill="none" stroke="#C9A04E" stroke-width="1" opacity="0.6"/>
  </g>
  <!-- Calligraphy seal mark -->
  <rect x="290" y="400" width="60" height="60" rx="4" fill="none" stroke="#A85A4D" stroke-width="1" opacity="0.5"/>
  <text x="320" y="440" text-anchor="middle" fill="#A85A4D" font-size="24" font-family="serif" opacity="0.7">太白</text>
</svg>